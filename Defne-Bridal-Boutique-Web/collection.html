<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defne Bridal Boutique | Exclusive Lookbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Embedded styling block specifically for collection filter bar alignment */
        .filter-wrapper { display: flex; justify-content: center; gap: 15px; margin-bottom: 60px; flex-wrap: wrap; }
        .btn-filter { background: transparent; border: 1px solid var(--border-color); color: #fff; padding: 12px 28px; border-radius: 25px; cursor: pointer; transition: var(--transition-smooth); font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; }
        .btn-filter.active, .btn-filter:hover { background: var(--gold-primary); color: #000; border-color: var(--gold-primary); box-shadow: 0 5px 15px var(--gold-glow); }
    </style>
</head>
<body>

    <header class="main-header" id="mainHeader"></header>

    <main class="container" style="margin-top: 120px;">
        <h2 class="section-title reveal">Exclusive <span>Bridal Collection</span></h2>
        
        <div class="filter-wrapper reveal" id="filterContainer"></div>

        <div class="gallery-grid" id="galleryGrid"></div>
    </main>

    <footer class="main-footer" id="mainFooter"></footer>

    <script src="js/app.js"></script>
</body>
</html>
